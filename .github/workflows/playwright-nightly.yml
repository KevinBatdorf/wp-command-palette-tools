name: Playwright Tests (Nightly)
permissions:
  contents: write
on:
  push:
    branches: main
  schedule:
    # At 08:00 daily - good for keeping up with latest WP releases
    - cron: '0 8 * * *'

jobs:
  playwright:
    timeout-minutes: 60
    name: Run Playwright tests (nightly)
    concurrency:
      group: ${{ github.workflow }} - ${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      id: setup-node
      with:
        node-version: lts/*
        cache: 'npm'
        cache-dependency-path: |
          package-lock.json
          package.json

    - name: Cache Playwright browsers
      id: cache-browsers
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json', 'package.json') }}
        restore-keys: |
          playwright-${{ runner.os }}-

    - name: Cache node_modules and npm cache
      id: cache-node-modules
      uses: actions/cache@v4
      with:
        path: |
          node_modules
          ~/.npm
        key: ${{ runner.os }}-node-${{ steps.setup-node.outputs.node-version }}-npm-${{ hashFiles('package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-${{ steps.setup-node.outputs.node-version }}-npm-

    - name: Install dependencies
      if: steps.cache-node-modules.outputs.cache-hit != 'true'
      run: npm ci --prefer-offline --no-audit --no-fund

    - name: Install Playwright Browsers
      if: steps.cache-browsers.outputs.cache-hit != 'true'
      run: npx playwright install --with-deps

    - name: Build project
      run: npm run build
      env:
        CI: true

    - name: Run Playwright tests
      run: npx playwright test
      env:
        WP_VERSION: nightly

    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report-nightly
        path: playwright-report/
        retention-days: 30
