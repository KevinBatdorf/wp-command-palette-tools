name: Build production zip file
on:
  push:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build zip file
    concurrency:
      group: ${{ github.workflow }} - ${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        id: setup-node
        with:
          node-version: lts/*
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            package.json

      - name: Cache node_modules and npm cache
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.npm
          key: ${{ runner.os }}-node-${{ steps.setup-node.outputs.node-version }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ steps.setup-node.outputs.node-version }}-npm-

      - name: npm install and build
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: |
          npm ci --prefer-offline --no-audit --no-fund
          npm run build
        env:
          CI: true

      - name: Build when cache hit
        if: steps.cache-node-modules.outputs.cache-hit == 'true'
        run: npm run build
        env:
          CI: true

      - name: Package
        uses: actions/upload-artifact@v4
        with:
          name: wpcp-tools
          retention-days: 5
          path: |
            ${{ github.workspace }}/
            !${{ github.workspace }}/node_modules/
            !${{ github.workspace }}/tests/
            !${{ github.workspace }}/scripts/
            !${{ github.workspace }}/.git/
            !${{ github.workspace }}/.github/
            !${{ github.workspace }}/.wordpress-org/
            !${{ github.workspace }}/assets/
            !${{ github.workspace }}/playwright-report/
            !${{ github.workspace }}/test-results/
            !${{ github.workspace }}/package-lock.json
